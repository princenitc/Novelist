version: '3.8'

services:
  neo4j:
    image: neo4j:5.15.0
    container_name: novelist-neo4j
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    environment:
      - NEO4J_AUTH=neo4j/thisIsPassword
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - novelist-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  novelist-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: novelist-app
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATA_NEO4J_URI=bolt://neo4j:7687
      - SPRING_DATA_NEO4J_USERNAME=neo4j
      - SPRING_DATA_NEO4J_PASSWORD=thisIsPassword
      - SPRING_PROFILES_ACTIVE=dev
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - novelist-network

volumes:
  neo4j_data:
  neo4j_logs:

networks:
  novelist-network:
    driver: bridge

