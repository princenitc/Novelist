# Application Configuration
spring.application.name=Novelist
server.port=8081

# Neo4j Configuration
# These properties are set via environment variables in Docker (see docker-compose.yml)
# For local development without Docker, uncomment and modify these:
# spring.neo4j.uri=bolt://localhost:7687
# spring.neo4j.authentication.username=neo4j
# spring.neo4j.authentication.password=password

# Pagination defaults
spring.data.web.pageable.default-page-size=20
spring.data.web.pageable.max-page-size=100
spring.data.web.pageable.one-indexed-parameters=false

# Neo4j connection pool
spring.neo4j.pool.max-connection-pool-size=50
spring.neo4j.pool.connection-acquisition-timeout=60s
spring.neo4j.pool.idle-time-before-connection-test=30s
spring.neo4j.pool.max-connection-lifetime=1h

# Logging Configuration
logging.level.root=INFO
logging.level.com.prince.novelist=INFO
logging.level.org.springframework.data.neo4j=DEBUG
logging.level.org.neo4j.driver=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Error handling
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param
server.error.include-exception=false

# Jackson JSON
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
spring.jackson.default-property-inclusion=non_null

# Testcontainers Configuration
testcontainers.output.enabled=true

# Validation Configuration
spring.validation.enabled=true

# API Documentation (Swagger/OpenAPI)
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Actuator (for future use)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

