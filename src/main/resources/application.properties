# Application Configuration
spring.application.name=Novelist
server.port=8081

# Neo4j Configuration
# These properties are set via environment variables in Docker (see docker-compose.yml)
# For local development without Docker, uncomment and modify these:
# spring.neo4j.uri=bolt://localhost:7687
# spring.neo4j.authentication.username=neo4j
# spring.neo4j.authentication.password=thisIsPassword

# Logging Configuration
logging.level.root=INFO
logging.level.com.prince.novelist=DEBUG
logging.level.org.springframework.data.neo4j=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Testcontainers Configuration
testcontainers.output.enabled=true

# Validation Configuration
spring.validation.enabled=true

# API Documentation (Swagger/OpenAPI)
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
