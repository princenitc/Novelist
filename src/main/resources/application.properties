# Application Configuration
spring.application.name=Novelist
server.port=8081

# Neo4j Configuration (commented out for test profile - uses Testcontainers)
#spring.data.neo4j.uri=bolt://localhost:7687
#spring.data.neo4j.username=neo4j
#spring.data.neo4j.password=thisIsPassword

# Logging Configuration
logging.level.root=INFO
logging.level.com.prince.novelist=DEBUG
logging.level.org.springframework.data.neo4j=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Testcontainers Configuration
testcontainers.output.enabled=true

# Validation Configuration
spring.validation.enabled=true

# API Documentation (Swagger/OpenAPI)
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
